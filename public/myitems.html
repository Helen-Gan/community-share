<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的物品 - 社区闲置物品交换平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/"><h1>🏠 社区闲置交换</h1></a>
            </div>
            <div class="nav-menu">
                <a href="/">首页</a>
                <a href="publish.html">发布物品</a>
                <span class="nav-user"></span>
                <a href="#" class="nav-logout">退出</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <div class="myitems-container">
                <div class="page-header">
                    <h2>我的物品</h2>
                    <a href="publish.html" class="btn-primary">发布新物品</a>
                </div>

                <!-- 统计卡片 -->
                <div class="stats-cards" id="statsCards">
                    <div class="stat-card">
                        <div class="stat-value" id="statAvailable">0</div>
                        <div class="stat-label">可交易</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statReserved">0</div>
                        <div class="stat-label">已预留</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statSold">0</div>
                        <div class="stat-label">已售出</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statDeleted">0</div>
                        <div class="stat-label">已删除</div>
                    </div>
                </div>

                <!-- 筛选标签 -->
                <div class="filter-tabs">
                    <button class="filter-tab active" data-status="all">全部</button>
                    <button class="filter-tab" data-status="available">可交易</button>
                    <button class="filter-tab" data-status="reserved">已预留</button>
                    <button class="filter-tab" data-status="sold">已售出</button>
                    <button class="filter-tab" data-status="deleted">已删除</button>
                </div>

                <!-- 物品列表 -->
                <div class="my-items-list" id="myItemsList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 社区闲置物品交换平台. 让闲置物品重新焕发生机.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuth();
            loadMyItems('all');

            // 筛选标签切换
            document.querySelector('.filter-tabs').addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-tab')) {
                    document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
                    e.target.classList.add('active');
                    loadMyItems(e.target.dataset.status);
                }
            });
        });

        async function loadMyItems(status) {
            const token = localStorage.getItem('token');
            if (!token) {
                showToast('请先登录', 'error');
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`/api/v1/items/mine?status=${status}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.success) {
                    // 修改点：stats 现在在 result.stats 中，不再在 result.pagination 下
                    updateStats(result.stats || {});
                    renderMyItems(result.data);
                } else {
                    showToast(result.error.message, 'error');
                }
            } catch (error) {
                console.error('加载失败:', error);
                showToast('加载失败，请重试', 'error');
            }
        }

        function updateStats(stats) {
            document.getElementById('statAvailable').textContent = stats.available || 0;
            document.getElementById('statReserved').textContent = stats.reserved || 0;
            document.getElementById('statSold').textContent = stats.sold || 0;
            document.getElementById('statDeleted').textContent = stats.deleted || 0;
        }

        function renderMyItems(items) {
            const container = document.getElementById('myItemsList');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>暂无物品</p>
                        <p>快去发布第一个物品吧！</p>
                        <a href="publish.html" class="btn-primary">发布物品</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="my-item-card">
                    <div class="my-item-image">
                        <img src="${item.thumbnailUrl}" alt="${item.title}">
                        <span class="status-badge ${item.status}">${getStatusText(item.status)}</span>
                    </div>
                    <div class="my-item-info">
                        <h3>${item.title}</h3>
                        <div class="my-item-meta">
                            <span class="price">${item.priceDisplay}</span>
                            <span class="time">${item.createdAt}</span>
                        </div>
                        <div class="my-item-stats">
                            <span>👁 ${item.viewCount}</span>
                            <span>💬 ${item.contactCount}</span>
                        </div>
                        <div class="my-item-actions">
                            ${item.status === 'available' ? `
                                <button class="btn-small btn-outline" onclick="window.location.href='detail.html?id=${item.id}'">查看</button>
                            ` : ''}
                            ${item.status === 'available' ? `
                                <button class="btn-small btn-outline" onclick="editItem(${item.id})">编辑</button>
                            ` : ''}
                            <button class="btn-small btn-danger" onclick="deleteItem(${item.id})">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const statusMap = {
                'available': '可交易',
                'reserved': '已预留',
                'sold': '已售出',
                'deleted': '已删除'
            };
            return statusMap[status] || status;
        }

        function editItem(itemId) {
            // 简化版：跳转到详情页
            window.location.href = `detail.html?id=${itemId}`;
        }

        async function deleteItem(itemId) {
            if (!confirm('确定要删除这个物品吗？')) {
                return;
            }

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`/api/v1/items/${itemId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.success) {
                    showToast('物品已删除', 'success');
                    // 重新加载列表
                    const activeTab = document.querySelector('.filter-tab.active');
                    loadMyItems(activeTab ? activeTab.dataset.status : 'all');
                } else {
                    showToast(result.error.message, 'error');
                }
            } catch (error) {
                console.error('删除失败:', error);
                showToast('删除失败，请重试', 'error');
            }
        }
    </script>
</body>
</html>
