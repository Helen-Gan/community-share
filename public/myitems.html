<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=profile.html">
    <title>页面已移动</title>
</head>
<body>
    <p>此页面已整合到个人主页，正在跳转...</p>
    <p>如果没有自动跳转，请<a href="profile.html">点击这里</a>。</p>
    <script>
        // 获取当前登录用户ID并跳转
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.id) {
            window.location.href = 'profile.html?id=' + user.id;
        } else {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
