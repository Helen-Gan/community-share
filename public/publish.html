<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布物品 - 社区闲置物品交换平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/"><h1>🏠 社区闲置交换</h1></a>
            </div>
            <div class="nav-menu">
                <a href="/">首页</a>
                <span class="nav-user"></span>
                <a href="#" class="nav-logout">退出</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <div class="publish-container">
                <h2>发布物品</h2>
                <form id="publishForm">
                    <div class="form-section">
                        <h3>物品信息</h3>
                        
                        <div class="form-group">
                            <label>标题 <span class="required">*</span></label>
                            <input type="text" id="title" name="title" placeholder="请输入物品标题（5-50字）" required minlength="5" maxlength="50">
                        </div>

                        <div class="form-group">
                            <label>分类 <span class="required">*</span></label>
                            <select id="category" name="category" required>
                                <option value="">请选择分类</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>描述 <span class="required">*</span></label>
                            <textarea id="description" name="description" placeholder="请详细描述物品的品牌、型号、使用情况等（10-500字）" required minlength="10" maxlength="500" rows="5"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>价格</label>
                                <input type="number" id="price" name="price" placeholder="不填则显示为免费/面议" min="0" step="0.01">
                            </div>
                            <div class="form-group">
                                <label>新旧程度 <span class="required">*</span></label>
                                <select id="condition" name="condition" required>
                                    <option value="全新">全新</option>
                                    <option value="99新">99新</option>
                                    <option value="9成新" selected>9成新</option>
                                    <option value="8成新">8成新</option>
                                    <option value="7成新及以下">7成新及以下</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>物品图片</h3>
                        <div class="image-upload">
                            <div class="upload-area" id="uploadArea">
                                <div class="upload-placeholder">
                                    <span>+</span>
                                    <p>点击上传图片</p>
                                    <p class="upload-hint">最多上传5张，每张不超过5MB</p>
                                </div>
                            </div>
                            <input type="file" id="imageInput" accept="image/jpeg,image/jpg,image/png,image/webp" multiple style="display: none;">
                            <div class="image-preview" id="imagePreview"></div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>联系方式</h3>
                        
                        <div class="form-group">
                            <label>联系方式类型 <span class="required">*</span></label>
                            <select id="contactMethod" name="contactMethod" required>
                                <option value="微信">微信</option>
                                <option value="手机号">手机号</option>
                                <option value="QQ">QQ</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>联系方式值 <span class="required">*</span></label>
                            <input type="text" id="contactValue" name="contactValue" placeholder="请输入微信号/手机号/QQ号" required>
                        </div>

                        <div class="form-group">
                            <label>可见性设置</label>
                            <select id="contactVisibility" name="contactVisibility">
                                <option value="login_required" selected>仅登录用户可见</option>
                                <option value="public">所有人可见</option>
                                <option value="transaction">联系后可见</option>
                            </select>
                            <p class="form-hint">为保护隐私，建议选择"仅登录用户可见"</p>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary btn-large">发布物品</button>
                        <a href="/" class="btn-outline">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 社区闲置物品交换平台. 让闲置物品重新焕发生机.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let uploadedImages = [];

        document.addEventListener('DOMContentLoaded', async () => {
            checkAuth();
            await loadCategories();
            initImageUpload();
        });

        async function loadCategories() {
            try {
                const response = await fetch('/api/v1/categories');
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('category');
                    result.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = `${cat.icon} ${cat.name}`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载分类失败:', error);
                showToast('加载分类失败', 'error');
            }
        }

        function initImageUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const imageInput = document.getElementById('imageInput');

            uploadArea.addEventListener('click', () => {
                imageInput.click();
            });

            imageInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                
                if (uploadedImages.length + files.length > 5) {
                    showToast('最多上传5张图片', 'error');
                    return;
                }

                for (const file of files) {
                    if (file.size > 5 * 1024 * 1024) {
                        showToast('图片大小不能超过5MB', 'error');
                        continue;
                    }

                    await uploadImage(file);
                }

                imageInput.value = '';
            });
        }

        async function uploadImage(file) {
            const token = localStorage.getItem('token');
            
            const formData = new FormData();
            formData.append('images', file);

            try {
                const response = await fetch('/api/v1/items', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                // 注意：这里简化了，实际上应该先上传图片再发布物品
                // 为了演示，我们暂时存储文件对象
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImages.push({
                        file: file,
                        preview: e.target.result
                    });
                    renderImagePreview();
                };
                reader.readAsDataURL(file);
                
                showToast('图片已添加', 'success');
            } catch (error) {
                console.error('上传失败:', error);
                showToast('上传失败', 'error');
            }
        }

        function renderImagePreview() {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = uploadedImages.map((img, index) => `
                <div class="preview-item">
                    <img src="${img.preview}" alt="预览">
                    <button type="button" class="remove-btn" onclick="removeImage(${index})">×</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreview();
        }

        document.getElementById('publishForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                showToast('请先登录', 'error');
                window.location.href = 'login.html';
                return;
            }

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('categoryId', document.getElementById('category').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('price', document.getElementById('price').value || '');
            formData.append('condition', document.getElementById('condition').value);
            formData.append('contactMethod', document.getElementById('contactMethod').value);
            formData.append('contactValue', document.getElementById('contactValue').value);
            formData.append('contactVisibility', document.getElementById('contactVisibility').value);

            // 添加图片
            uploadedImages.forEach(img => {
                formData.append('images', img.file);
            });

            try {
                const response = await fetch('/api/v1/items', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showToast('物品发布成功！', 'success');
                    setTimeout(() => {
                        window.location.href = result.data.url || '/';
                    }, 1000);
                } else {
                    showToast(result.error.message, 'error');
                }
            } catch (error) {
                console.error('发布失败:', error);
                showToast('发布失败，请重试', 'error');
            }
        });
    </script>
</body>
</html>
